{% extends 'base.html' %}

{% block title %}Интерактивна карта - Smart City{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4"><i class="fas fa-map-marked-alt me-3 text-danger"></i>Интерактивна карта</h2>
        </div>
    </div>
    
    <div class="row">
        <!-- Map -->
        <div class="col-lg-9">
            <div class="card">
                <div class="card-body p-0">
                    <div id="map" style="height: 70vh;"></div>
                </div>
            </div>
        </div>
        
        <!-- Sidebar -->
        <div class="col-lg-3">
            <!-- Legend -->
            <div class="card mb-3">
                <div class="card-header">
                    <i class="fas fa-info-circle me-2"></i>Легенда
                </div>
                <div class="card-body">
                    <div class="d-flex align-items-center mb-2">
                        <span class="badge bg-success me-2">●</span>
                        <span>Активен сензор</span>
                    </div>
                    <div class="d-flex align-items-center mb-2">
                        <span class="badge bg-danger me-2">●</span>
                        <span>Инцидент</span>
                    </div>
                    <div class="d-flex align-items-center mb-2">
                        <span class="badge bg-warning me-2">●</span>
                        <span>Аномалия</span>
                    </div>
                </div>
            </div>
            
            <!-- Filters -->
            <div class="card mb-3">
                <div class="card-header">
                    <i class="fas fa-filter me-2"></i>Филтри
                </div>
                <div class="card-body">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="showSensors" checked>
                        <label class="form-check-label" for="showSensors">Покажи сензори</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="showIncidents" checked>
                        <label class="form-check-label" for="showIncidents">Покажи инциденти</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="showAnomalies">
                        <label class="form-check-label" for="showAnomalies">Покажи аномалии</label>
                    </div>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-chart-bar me-2"></i>Статистика
                </div>
                <div class="card-body">
                    <p class="mb-1"><strong>Сензори:</strong> <span id="sensorCount">0</span></p>
                    <p class="mb-1"><strong>Инциденти:</strong> <span id="incidentCount">0</span></p>
                    <p class="mb-0"><strong>Аномалии:</strong> <span id="anomalyCount">0</span></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Initialize map
    const map = L.map('map').setView([42.6977, 23.3219], 12);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    
    // Layer groups
    const sensorLayer = L.layerGroup().addTo(map);
    const incidentLayer = L.layerGroup().addTo(map);
    const anomalyLayer = L.layerGroup().addTo(map);
    
    // Sensor icon
    const sensorIcon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='background-color:#28a745;width:12px;height:12px;border-radius:50%;border:2px solid white;'></div>",
        iconSize: [12, 12],
        iconAnchor: [6, 6]
    });
    
    // Add sensors
    const sensors = [
        {% for sensor in sensors %}
        {
            name: '{{ sensor.name }}',
            lat: {{ sensor.latitude }},
            lng: {{ sensor.longitude }},
            type: '{{ sensor.get_sensor_type_display }}',
            district: '{{ sensor.district }}'
        },
        {% endfor %}
    ];
    
    sensors.forEach(sensor => {
        L.marker([sensor.lat, sensor.lng], {icon: sensorIcon})
            .bindPopup(`<b>${sensor.name}</b><br>${sensor.type}<br>${sensor.district}`)
            .addTo(sensorLayer);
    });
    
    // Add incidents
    const incidents = [
        {% for incident in incidents %}
        {
            title: '{{ incident.title }}',
            lat: {{ incident.latitude }},
            lng: {{ incident.longitude }},
            district: '{{ incident.district }}',
            status: '{{ incident.get_status_display }}'
        },
        {% endfor %}
    ];
    
    incidents.forEach(incident => {
        L.circleMarker([incident.lat, incident.lng], {
            radius: 10,
            fillColor: '#dc3545',
            color: '#fff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8
        }).bindPopup(`<b>${incident.title}</b><br>${incident.district}<br>Статус: ${incident.status}`)
          .addTo(incidentLayer);
    });
    
    // Add anomalies
    const anomalies = [
        {% for anomaly in anomalies %}
        {
            title: '{{ anomaly.title }}',
            lat: {{ anomaly.latitude|default:"null" }},
            lng: {{ anomaly.longitude|default:"null" }},
            severity: '{{ anomaly.severity }}'
        },
        {% endfor %}
    ];
    
    anomalies.forEach(anomaly => {
        if (anomaly.lat && anomaly.lng) {
            const color = anomaly.severity === 'critical' ? '#dc3545' : 
                         anomaly.severity === 'high' ? '#fd7e14' : '#ffc107';
            
            L.circleMarker([anomaly.lat, anomaly.lng], {
                radius: 8,
                fillColor: color,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).bindPopup(`<b>${anomaly.title}</b><br>Тежест: ${anomaly.severity}`)
              .addTo(anomalyLayer);
        }
    });
    
    // Update counts
    document.getElementById('sensorCount').textContent = sensors.length;
    document.getElementById('incidentCount').textContent = incidents.length;
    document.getElementById('anomalyCount').textContent = anomalies.filter(a => a.lat).length;
    
    // Filter handlers
    document.getElementById('showSensors').addEventListener('change', function() {
        if (this.checked) map.addLayer(sensorLayer);
        else map.removeLayer(sensorLayer);
    });
    
    document.getElementById('showIncidents').addEventListener('change', function() {
        if (this.checked) map.addLayer(incidentLayer);
        else map.removeLayer(incidentLayer);
    });
    
    document.getElementById('showAnomalies').addEventListener('change', function() {
        if (this.checked) map.addLayer(anomalyLayer);
        else map.removeLayer(anomalyLayer);
    });
</script>
{% endblock %}
